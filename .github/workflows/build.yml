name: Build

on:
  push:
  workflow_dispatch:

jobs:

  build:
    runs-on: windows-latest 
    name: Build
    
    steps:
    - name: Checkout
      uses: actions/checkout@v6

#    - name: Install .NET Core
#      uses: actions/setup-dotnet@v4
#      with:
#        dotnet-version: 8.0.x

    - name: Publish
      run: dotnet publish -c Release -f net10.0-windows7.0 -r win-x64 --self-contained false -o publish

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: InkCanvasForClass-Remastered-${{ github.sha }}
        path: publish/

    - name: Publish (SingleFile + ReadyToRun)
      run: dotnet publish -c Release -f net10.0-windows7.0 -r win-x64 --self-contained false -o publish-singlefile -p:PublishSingleFile=true -p:ReadyToRun=true

    - name: Upload artifact (SingleFile + ReadyToRun)
      uses: actions/upload-artifact@v6
      with:
        name: InkCanvasForClass-Remastered-SingleFile-${{ github.sha }}
        path: publish-singlefile/

